name: Remote Deploy to Hetzner

on:
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Remote deploy via SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_PRIVATE_KEY }}
          port: ${{ secrets.HETZNER_SSH_PORT || '22' }}
          script: |
            set -euo pipefail
            APP_DIR=${{ secrets.APP_DIR }}
            CONTAINER_NAME=${{ secrets.CONTAINER_NAME }}
            IMAGE_NAME=${{ secrets.IMAGE_NAME }}

            echo "Deploying to ${HETZNER_HOST}:${APP_DIR}"
            cd "${APP_DIR}"
            git fetch --all --prune
            git reset --hard origin/main

            echo "Building Docker image: ${IMAGE_NAME}"
            docker build -t "${IMAGE_NAME}" .

            echo "Stopping old container (if exists)..."
            docker ps -a --format '{{.Names}}' | grep -q "${CONTAINER_NAME}" && docker stop "${CONTAINER_NAME}" || true
            docker ps -a --format '{{.Names}}' | grep -q "${CONTAINER_NAME}" && docker rm "${CONTAINER_NAME}" || true

            if [ -f "${APP_DIR}/.env" ]; then
              ENV_ARG="--env-file ${APP_DIR}/.env"
            else
              echo "Warning: ${APP_DIR}/.env not found — container will start without .env file"
              ENV_ARG=""
            fi

            docker run -d --name "${CONTAINER_NAME}" --network coolify ${ENV_ARG} --restart unless-stopped "${IMAGE_NAME}"

            sleep 4
            if docker ps --format '{{.Names}}' | grep -q "${CONTAINER_NAME}"; then
              docker ps --filter "name=${CONTAINER_NAME}" --format 'Name: {{.Names}} Image: {{.Image}} Status: {{.Status}}'
              docker logs --tail 200 "${CONTAINER_NAME}" || true
            else
              echo "ERROR: container failed to start. Inspect /tmp/deploy_build.log and docker logs on server."
              exit 1
            fi

            # server-side health check
            curl -sS http://localhost:80/health || curl -sk https://localhost/health -H 'Host: veklom.com' || true
